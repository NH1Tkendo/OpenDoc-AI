name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: opendoc-ai/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: opendoc-ai

      - name: Run lint
        run: npm run lint
        working-directory: opendoc-ai

      - name: Type check
        run: npx tsc --noEmit
        working-directory: opendoc-ai

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: opendoc-ai/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: opendoc-ai

      - name: Run unit tests
        run: npm run test
        working-directory: opendoc-ai

  build-and-e2e:
    needs: [lint-and-typecheck, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: opendoc-ai/package-lock.json
      
      - name: Install dependencies
        run: npm ci
        working-directory: opendoc-ai

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        working-directory: opendoc-ai

      - name: Build and Run E2E Tests
        run: npm run test:e2e
        working-directory: opendoc-ai
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'placeholder' }}
          PAT: ${{ secrets.PAT || 'placeholder' }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: opendoc-ai/playwright-report/
          retention-days: 30

  deploy-preview:
    needs: build-and-e2e
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel (Preview)
        run: echo "Deploying to Vercel Preview..."
        # In a real scenario, you'd use amondnet/vercel-action or similar here

  deploy-production:
    needs: build-and-e2e
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Vercel (Production)
        run: echo "Deploying to Vercel Production..."
        # In a real scenario, you'd use amondnet/vercel-action or similar here
