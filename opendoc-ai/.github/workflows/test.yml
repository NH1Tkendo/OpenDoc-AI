name: CI

on:
  push:
    branches: [ main, "feat/*", "fix/*" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: opendoc-ai/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: opendoc-ai

    - name: Run lint
      run: npm run lint
      working-directory: opendoc-ai

    - name: Type check
      run: npx tsc --noEmit
      working-directory: opendoc-ai
